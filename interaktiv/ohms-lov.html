<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohms lov-beregner | El-Teori Kursus</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2332;
    --accent: #ffd700;
    --accent2: #4dd0e1;
    --text: #e0e6ed;
    --muted: #8da4b8;
    --border: #2a3f56;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 {
    color: var(--accent);
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
    direction: rtl;
    text-align: right;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .input-group { display: flex; flex-direction: column; }
  label {
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--accent2);
  }
  .ar { color: var(--muted); font-size: 0.85em; margin-right: 8px; direction: rtl; }
  input[type="number"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 1rem;
    font-family: inherit;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  input.calculated {
    background: #16382e;
    border-color: #2da57d;
    color: #6dd9b3;
  }
  .results {
    margin-top: 20px;
    padding: 16px;
    background: rgba(77, 208, 225, 0.05);
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
  }
  .results h3 { color: var(--accent2); margin-bottom: 8px; font-size: 1.1rem; }
  .formula {
    background: var(--bg);
    padding: 10px;
    border-radius: 6px;
    font-family: "Courier New", monospace;
    margin: 8px 0;
    color: var(--accent);
  }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 10px;
  }
  button:hover { opacity: 0.85; }
  .back-link {
    display: inline-block;
    color: var(--accent2);
    text-decoration: none;
    margin-bottom: 20px;
  }
  .back-link:hover { text-decoration: underline; }
  .info {
    background: rgba(255, 215, 0, 0.05);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 4px;
    margin-top: 20px;
    font-size: 0.95rem;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="../README.md" class="back-link">← Tilbage til oversigt</a>

  <h1>⚡ Ohms lov-beregner</h1>
  <p class="subtitle">حاسبة قانون أوم — أدخل قيمتين فقط، احسب الباقي</p>

  <div class="card">
    <p style="margin-bottom:16px;color:var(--muted)">
      Indtast <b>to af de fire</b> værdier, så beregner systemet de øvrige.<br>
      <span class="ar">أدخل قيمتين من الأربعة، وسيحسب النظام الباقي.</span>
    </p>

    <div class="grid">
      <div class="input-group">
        <label>Spænding U (V) <span class="ar">الجهد</span></label>
        <input type="number" id="U" step="any" placeholder="fx 230">
      </div>
      <div class="input-group">
        <label>Strøm I (A) <span class="ar">التيار</span></label>
        <input type="number" id="I" step="any" placeholder="fx 0.5">
      </div>
      <div class="input-group">
        <label>Modstand R (Ω) <span class="ar">المقاومة</span></label>
        <input type="number" id="R" step="any" placeholder="fx 460">
      </div>
      <div class="input-group">
        <label>Effekt P (W) <span class="ar">القدرة</span></label>
        <input type="number" id="P" step="any" placeholder="fx 115">
      </div>
    </div>

    <button onclick="reset()">🔄 Nulstil</button>

    <div class="results" id="results" style="display:none">
      <h3>Resultater</h3>
      <div id="output"></div>
    </div>

    <div class="info">
      💡 <b>Formler:</b><br>
      <div class="formula">U = R · I</div>
      <div class="formula">P = U · I = I² · R = U² / R</div>
    </div>
  </div>
</div>

<script>
  const inputs = ['U', 'I', 'R', 'P'];
  inputs.forEach(id => {
    document.getElementById(id).addEventListener('input', calculate);
  });

  function calculate() {
    const vals = {};
    inputs.forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('calculated');
      const v = parseFloat(el.value);
      if (!isNaN(v) && v > 0) vals[id] = v;
    });

    const filled = Object.keys(vals);
    if (filled.length < 2) {
      document.getElementById('results').style.display = 'none';
      return;
    }

    let U = vals.U, I = vals.I, R = vals.R, P = vals.P;

    // Beregningslogik baseret på hvilke værdier der er angivet
    if (U && I) {
      R = U / I;
      P = U * I;
    } else if (U && R) {
      I = U / R;
      P = U * I;
    } else if (U && P) {
      I = P / U;
      R = U / I;
    } else if (I && R) {
      U = I * R;
      P = U * I;
    } else if (I && P) {
      U = P / I;
      R = U / I;
    } else if (R && P) {
      I = Math.sqrt(P / R);
      U = I * R;
    }

    // Vis resultater og marker beregnede felter
    if (!filled.includes('U')) { document.getElementById('U').value = U.toPrecision(4); document.getElementById('U').classList.add('calculated'); }
    if (!filled.includes('I')) { document.getElementById('I').value = I.toPrecision(4); document.getElementById('I').classList.add('calculated'); }
    if (!filled.includes('R')) { document.getElementById('R').value = R.toPrecision(4); document.getElementById('R').classList.add('calculated'); }
    if (!filled.includes('P')) { document.getElementById('P').value = P.toPrecision(4); document.getElementById('P').classList.add('calculated'); }

    document.getElementById('results').style.display = 'block';
    document.getElementById('output').innerHTML = `
      <p>📊 <b>U =</b> ${formatVal(U, 'V')}, <b>I =</b> ${formatVal(I, 'A')}, <b>R =</b> ${formatVal(R, 'Ω')}, <b>P =</b> ${formatVal(P, 'W')}</p>
    `;
  }

  function formatVal(v, unit) {
    if (v >= 1e6) return (v/1e6).toFixed(2) + ' M' + unit;
    if (v >= 1e3) return (v/1e3).toFixed(2) + ' k' + unit;
    if (v >= 1) return v.toFixed(2) + ' ' + unit;
    if (v >= 1e-3) return (v*1e3).toFixed(2) + ' m' + unit;
    if (v >= 1e-6) return (v*1e6).toFixed(2) + ' μ' + unit;
    return v.toExponential(2) + ' ' + unit;
  }

  function reset() {
    inputs.forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.classList.remove('calculated');
    });
    document.getElementById('results').style.display = 'none';
  }
</script>
</body>
</html>
