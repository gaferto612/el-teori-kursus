<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talsystem-konverter | El-Teori Kursus</title>
<style>
  :root {
    --bg: #0f1419; --card: #1a2332; --accent: #ffd700; --accent2: #4dd0e1;
    --green: #6dd9b3; --text: #e0e6ed; --muted: #8da4b8; --border: #2a3f56;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", "Noto Naskh Arabic", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
  html[dir="rtl"] body { font-family: "Noto Naskh Arabic", "Segoe UI", -apple-system, sans-serif; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: var(--accent); font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; }
  .topbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .lang-switcher { display: flex; gap: 4px; }
  .lang-switcher button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
  .lang-switcher button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
  .lang-switcher button:hover:not(.active) { border-color: var(--accent2); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .conv-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
  html[dir="rtl"] .conv-row { grid-template-columns: 1fr 140px; }
  label { color: var(--accent2); font-weight: 600; }
  input { background: var(--bg); color: var(--accent); border: 1px solid var(--border); border-radius: 8px;
          padding: 12px; font-family: "Courier New", monospace; font-size: 1.2rem; width: 100%; letter-spacing: 1px; direction: ltr; text-align: left; }
  input:focus { outline: none; border-color: var(--accent); }
  input.error { border-color: #ff6b6b; }
  .table { width: 100%; border-collapse: collapse; margin-top: 16px; font-family: "Courier New", monospace; }
  .table th { color: var(--accent2); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  html[dir="rtl"] .table th { text-align: right; }
  .table td { padding: 6px 12px; border-bottom: 1px solid rgba(42,63,86,0.3); }
  .table tr:hover { background: rgba(255,215,0,0.05); }
  .back-link { display: inline-block; color: var(--accent2); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
  .info { background: rgba(255,215,0,0.05); border-left: 3px solid var(--accent); padding: 12px 16px;
          border-radius: 4px; margin-top: 20px; font-size: 0.95rem; }
  html[dir="rtl"] .info { border-left: none; border-right: 3px solid var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="../" class="back-link" data-i18n="back">← Tilbage til oversigt</a>
    <div class="lang-switcher" role="group" aria-label="Language">
      <button data-lang="da" class="active">🇩🇰 DA</button>
      <button data-lang="en">🇬🇧 EN</button>
      <button data-lang="ar">🇸🇦 AR</button>
    </div>
  </div>

  <h1 data-i18n="title">🔢 Talsystem-konverter</h1>
  <p class="subtitle" data-i18n="subtitle">Konverter mellem decimal, binær, oktal og hexadecimal</p>

  <div class="card">
    <div class="conv-row">
      <label for="dec" data-i18n="dec">Decimal (10)</label>
      <input type="text" id="dec" placeholder="0-9" oninput="convert('dec')" inputmode="numeric">
    </div>
    <div class="conv-row">
      <label for="bin" data-i18n="bin">Binær (2)</label>
      <input type="text" id="bin" placeholder="0,1" oninput="convert('bin')">
    </div>
    <div class="conv-row">
      <label for="oct" data-i18n="oct">Oktal (8)</label>
      <input type="text" id="oct" placeholder="0-7" oninput="convert('oct')">
    </div>
    <div class="conv-row">
      <label for="hex" data-i18n="hex">Hex (16)</label>
      <input type="text" id="hex" placeholder="0-9, A-F" oninput="convert('hex')">
    </div>

    <div class="info" id="explanation"></div>
  </div>

  <div class="card">
    <h3 style="color:var(--accent2);margin-bottom:12px" data-i18n="refTitle">📊 Reference-tabel (0-15)</h3>
    <table class="table">
      <tr>
        <th data-i18n="thDec">Decimal</th>
        <th data-i18n="thBin">Binær</th>
        <th data-i18n="thOct">Oktal</th>
        <th data-i18n="thHex">Hex</th>
      </tr>
      <tbody id="ref-table"></tbody>
    </table>
  </div>
</div>

<script>
  const I18N = {
    da: {
      back: "← Tilbage til oversigt",
      title: "🔢 Talsystem-konverter",
      subtitle: "Konverter mellem decimal, binær, oktal og hexadecimal",
      dec: "Decimal (10)", bin: "Binær (2)", oct: "Oktal (8)", hex: "Hex (16)",
      refTitle: "📊 Reference-tabel (0-15)",
      thDec: "Decimal", thBin: "Binær", thOct: "Oktal", thHex: "Hex",
      invalid: "⚠ Ugyldigt input",
      zero: "Tallet 0 er ens i alle systemer.",
      stepsTitle: "Trin-for-trin (decimal → binær)",
      readBottom: "Læs nedefra og op:",
      hexNote: "I hex: ${hex} (hver 4-bit gruppe = 1 hex-ciffer)"
    },
    en: {
      back: "← Back to overview",
      title: "🔢 Number-system converter",
      subtitle: "Convert between decimal, binary, octal and hexadecimal",
      dec: "Decimal (10)", bin: "Binary (2)", oct: "Octal (8)", hex: "Hex (16)",
      refTitle: "📊 Reference table (0-15)",
      thDec: "Decimal", thBin: "Binary", thOct: "Octal", thHex: "Hex",
      invalid: "⚠ Invalid input",
      zero: "The number 0 is the same in every system.",
      stepsTitle: "Step by step (decimal → binary)",
      readBottom: "Read from bottom to top:",
      hexNote: "In hex: ${hex} (each 4-bit group = 1 hex digit)"
    },
    ar: {
      back: "→ العودة إلى القائمة",
      title: "🔢 محوّل أنظمة الأرقام",
      subtitle: "حوّل بين الأنظمة العشري والثنائي والثماني والسادس عشر",
      dec: "عشري (10)", bin: "ثنائي (2)", oct: "ثماني (8)", hex: "سادس عشر (16)",
      refTitle: "📊 جدول مرجعي (0-15)",
      thDec: "عشري", thBin: "ثنائي", thOct: "ثماني", thHex: "سادس عشر",
      invalid: "⚠ إدخال غير صالح",
      zero: "الرقم 0 هو نفسه في جميع الأنظمة.",
      stepsTitle: "خطوة بخطوة (عشري ← ثنائي)",
      readBottom: "اقرأ من الأسفل إلى الأعلى:",
      hexNote: "بالسادس عشر: ${hex} (كل 4 بِتّ = خانة واحدة)"
    }
  };
  let currentLang = 'da';
  function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || I18N.da[key] || key; }

  function applyLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const v = t(key);
      if (v) el.innerHTML = v;
    });
    document.querySelectorAll('.lang-switcher button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    try { localStorage.setItem('elteori-lang', lang); } catch (e) {}
    // Re-run conversion to update explanation text in current language
    const lastFilled = ['dec','bin','oct','hex'].find(id => document.getElementById(id).value.trim() !== '');
    if (lastFilled) convert(lastFilled);
  }
  document.querySelectorAll('.lang-switcher button').forEach(b => {
    b.addEventListener('click', () => applyLang(b.dataset.lang));
  });
  let savedLang = 'da';
  try { savedLang = localStorage.getItem('elteori-lang') || 'da'; } catch (e) {}

  function convert(source) {
    const el = document.getElementById(source);
    el.classList.remove('error');
    let val = el.value.trim().toUpperCase();
    if (!val) { clearAll(); return; }

    let dec;
    try {
      if (source === 'dec') {
        if (!/^\d+$/.test(val)) throw new Error();
        dec = parseInt(val, 10);
      } else if (source === 'bin') {
        if (!/^[01]+$/.test(val)) throw new Error();
        dec = parseInt(val, 2);
      } else if (source === 'oct') {
        if (!/^[0-7]+$/.test(val)) throw new Error();
        dec = parseInt(val, 8);
      } else if (source === 'hex') {
        if (!/^[0-9A-F]+$/.test(val)) throw new Error();
        dec = parseInt(val, 16);
      }
      if (isNaN(dec) || dec < 0 || dec > Number.MAX_SAFE_INTEGER) throw new Error();
    } catch (e) {
      el.classList.add('error');
      document.getElementById('explanation').innerHTML = t('invalid');
      return;
    }

    if (source !== 'dec') document.getElementById('dec').value = dec.toString(10);
    if (source !== 'bin') document.getElementById('bin').value = dec.toString(2);
    if (source !== 'oct') document.getElementById('oct').value = dec.toString(8);
    if (source !== 'hex') document.getElementById('hex').value = dec.toString(16).toUpperCase();

    explainConversion(dec);
  }

  function clearAll() {
    ['dec','bin','oct','hex'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('explanation').innerHTML = '';
  }

  function explainConversion(dec) {
    if (dec === 0) {
      document.getElementById('explanation').innerHTML = t('zero');
      return;
    }
    let html = `<b>${t('stepsTitle')}</b> — ${dec}:<br>`;
    let n = dec;
    let steps = [];
    let bin = '';
    while (n > 0) {
      const r = n % 2;
      steps.push(`${n} ÷ 2 = ${Math.floor(n/2)} rest ${r}`);
      bin = r + bin;
      n = Math.floor(n / 2);
    }
    html += '<div style="font-family:monospace;font-size:0.9em;margin:8px 0;background:var(--bg);padding:10px;border-radius:6px;direction:ltr;text-align:left">' + steps.join('<br>') + '</div>';
    html += `${t('readBottom')} <b style="color:var(--accent)">${bin}</b><br>`;
    html += `<br>${t('hexNote').replace('${hex}', dec.toString(16).toUpperCase())}`;
    document.getElementById('explanation').innerHTML = html;
  }

  // Reference-tabel
  const refTable = document.getElementById('ref-table');
  for (let i = 0; i <= 15; i++) {
    const row = document.createElement('tr');
    row.innerHTML = `<td>${i}</td><td>${i.toString(2).padStart(4,'0')}</td><td>${i.toString(8)}</td><td>${i.toString(16).toUpperCase()}</td>`;
    refTable.appendChild(row);
  }

  applyLang(savedLang);
</script>
</body>
</html>
