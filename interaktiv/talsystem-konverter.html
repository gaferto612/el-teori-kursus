<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talsystem-konverter | El-Teori Kursus</title>
<style>
  :root {
    --bg: #0f1419; --card: #1a2332; --accent: #ffd700; --accent2: #4dd0e1;
    --green: #6dd9b3; --text: #e0e6ed; --muted: #8da4b8; --border: #2a3f56;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: var(--accent); font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); margin-bottom: 2rem; }
  .ar { color: var(--muted); font-size: 0.85em; direction: rtl; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .conv-row { display: grid; grid-template-columns: 120px 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
  label { color: var(--accent2); font-weight: 600; }
  input { background: var(--bg); color: var(--accent); border: 1px solid var(--border); border-radius: 8px;
          padding: 12px; font-family: "Courier New", monospace; font-size: 1.2rem; width: 100%; letter-spacing: 1px; }
  input:focus { outline: none; border-color: var(--accent); }
  input.error { border-color: #ff6b6b; }
  .table { width: 100%; border-collapse: collapse; margin-top: 16px; font-family: "Courier New", monospace; }
  .table th { color: var(--accent2); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .table td { padding: 6px 12px; border-bottom: 1px solid rgba(42,63,86,0.3); }
  .table tr:hover { background: rgba(255,215,0,0.05); }
  .back-link { display: inline-block; color: var(--accent2); text-decoration: none; margin-bottom: 20px; }
  .info { background: rgba(255,215,0,0.05); border-left: 3px solid var(--accent); padding: 12px 16px;
          border-radius: 4px; margin-top: 20px; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="container">
  <a href="../README.md" class="back-link">← Tilbage til oversigt</a>

  <h1>🔢 Talsystem-konverter</h1>
  <p class="subtitle">Konverter mellem decimal, binær, oktal og hexadecimal<br><span class="ar">محول بين الأنظمة العشري والثنائي والثماني والسادس عشر</span></p>

  <div class="card">
    <div class="conv-row">
      <label>Decimal (10) <span class="ar">عشري</span></label>
      <input type="text" id="dec" placeholder="0-9" oninput="convert('dec')">
    </div>
    <div class="conv-row">
      <label>Binær (2) <span class="ar">ثنائي</span></label>
      <input type="text" id="bin" placeholder="0,1" oninput="convert('bin')">
    </div>
    <div class="conv-row">
      <label>Oktal (8) <span class="ar">ثماني</span></label>
      <input type="text" id="oct" placeholder="0-7" oninput="convert('oct')">
    </div>
    <div class="conv-row">
      <label>Hex (16) <span class="ar">سادس عشر</span></label>
      <input type="text" id="hex" placeholder="0-9, A-F" oninput="convert('hex')">
    </div>

    <div class="info" id="explanation"></div>
  </div>

  <div class="card">
    <h3 style="color:var(--accent2);margin-bottom:12px">📊 Reference-tabel (0-15)</h3>
    <table class="table">
      <tr><th>Decimal</th><th>Binær</th><th>Oktal</th><th>Hex</th></tr>
      <tbody id="ref-table"></tbody>
    </table>
  </div>
</div>

<script>
  function convert(source) {
    const el = document.getElementById(source);
    el.classList.remove('error');
    let val = el.value.trim().toUpperCase();
    if (!val) { clearAll(); return; }

    let dec;
    try {
      if (source === 'dec') {
        if (!/^\d+$/.test(val)) throw new Error();
        dec = parseInt(val, 10);
      } else if (source === 'bin') {
        if (!/^[01]+$/.test(val)) throw new Error();
        dec = parseInt(val, 2);
      } else if (source === 'oct') {
        if (!/^[0-7]+$/.test(val)) throw new Error();
        dec = parseInt(val, 8);
      } else if (source === 'hex') {
        if (!/^[0-9A-F]+$/.test(val)) throw new Error();
        dec = parseInt(val, 16);
      }
      if (isNaN(dec) || dec < 0 || dec > Number.MAX_SAFE_INTEGER) throw new Error();
    } catch (e) {
      el.classList.add('error');
      document.getElementById('explanation').innerHTML = '⚠ Ugyldigt input';
      return;
    }

    if (source !== 'dec') document.getElementById('dec').value = dec.toString(10);
    if (source !== 'bin') document.getElementById('bin').value = dec.toString(2);
    if (source !== 'oct') document.getElementById('oct').value = dec.toString(8);
    if (source !== 'hex') document.getElementById('hex').value = dec.toString(16).toUpperCase();

    explainConversion(dec);
  }

  function clearAll() {
    ['dec','bin','oct','hex'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('explanation').innerHTML = '';
  }

  function explainConversion(dec) {
    if (dec === 0) {
      document.getElementById('explanation').innerHTML = 'Tallet 0 er ens i alle systemer.';
      return;
    }
    let html = `<b>Trin-for-trin (decimal → binær)</b> for ${dec}:<br>`;
    let n = dec;
    let steps = [];
    let bin = '';
    while (n > 0) {
      const r = n % 2;
      steps.push(`${n} ÷ 2 = ${Math.floor(n/2)} rest ${r}`);
      bin = r + bin;
      n = Math.floor(n / 2);
    }
    html += '<div style="font-family:monospace;font-size:0.9em;margin:8px 0;background:var(--bg);padding:10px;border-radius:6px">' + steps.join('<br>') + '</div>';
    html += `Læs nedefra og op: <b style="color:var(--accent)">${bin}</b><br>`;
    html += `<br>I hex: ${dec.toString(16).toUpperCase()} (hver 4-bit gruppe = 1 hex-ciffer)`;
    document.getElementById('explanation').innerHTML = html;
  }

  // Reference-tabel
  const refTable = document.getElementById('ref-table');
  for (let i = 0; i <= 15; i++) {
    const row = document.createElement('tr');
    row.innerHTML = `<td>${i}</td><td>${i.toString(2).padStart(4,'0')}</td><td>${i.toString(8)}</td><td>${i.toString(16).toUpperCase()}</td>`;
    refTable.appendChild(row);
  }
</script>
</body>
</html>
