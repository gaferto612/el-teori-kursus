<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz | El-Teori Kursus</title>
<style>
  :root {
    --bg: #0f1419; --card: #1a2332; --accent: #ffd700; --accent2: #4dd0e1;
    --green: #6dd9b3; --red: #ff6b6b; --text: #e0e6ed; --muted: #8da4b8; --border: #2a3f56;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", "Noto Naskh Arabic", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
  html[dir="rtl"] body { font-family: "Noto Naskh Arabic", "Segoe UI", -apple-system, sans-serif; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: var(--accent); font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; }
  .topbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .lang-switcher { display: flex; gap: 4px; }
  .lang-switcher button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit; margin: 0; }
  .lang-switcher button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
  .lang-switcher button:hover:not(.active) { border-color: var(--accent2); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .progress-bar { background: var(--bg); border-radius: 8px; height: 12px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { background: var(--accent); height: 100%; transition: width 0.3s; }
  .question-num { color: var(--muted); font-size: 0.9em; margin-bottom: 8px; }
  .question { font-size: 1.15em; font-weight: 600; margin-bottom: 8px; }
  .chapter { color: var(--accent2); font-size: 0.85em; margin-bottom: 16px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { background: var(--bg); border: 2px solid var(--border); padding: 12px 16px; border-radius: 8px;
            cursor: pointer; text-align: start; color: var(--text); font-size: 1em; transition: all 0.15s; font-family: inherit; }
  .option:hover:not(.disabled) { border-color: var(--accent2); }
  .option.correct { background: rgba(109,217,179,0.15); border-color: var(--green); color: var(--green); }
  .option.wrong { background: rgba(255,107,107,0.15); border-color: var(--red); color: var(--red); }
  .option.disabled { cursor: default; }
  .feedback { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(109,217,179,0.1); border-left: 3px solid var(--green); }
  .feedback.wrong { background: rgba(255,107,107,0.1); border-left: 3px solid var(--red); }
  html[dir="rtl"] .feedback.correct, html[dir="rtl"] .feedback.wrong { border-left: none; border-right: 3px solid; }
  html[dir="rtl"] .feedback.correct { border-right-color: var(--green); }
  html[dir="rtl"] .feedback.wrong { border-right-color: var(--red); }
  button.cta { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px;
           border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1em; margin-top: 16px; font-family: inherit; }
  button.cta:hover { opacity: 0.85; }
  button.cta:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 12px 24px;
           border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1em; font-family: inherit; }
  button.secondary:hover { border-color: var(--accent2); }
  .start-screen, .end-screen { text-align: center; padding: 40px 20px; }
  .score-big { font-size: 3rem; color: var(--accent); font-weight: 700; }
  .score-pct { font-size: 1.5rem; color: var(--accent2); }
  .back-link { display: inline-block; color: var(--accent2); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="../" class="back-link" data-i18n="back">← Tilbage til oversigt</a>
    <div class="lang-switcher" role="group" aria-label="Language">
      <button data-lang="da" class="active">🇩🇰 DA</button>
      <button data-lang="en">🇬🇧 EN</button>
      <button data-lang="ar">🇸🇦 AR</button>
    </div>
  </div>

  <h1 data-i18n="title">📝 Quiz — El-Teori</h1>
  <p class="subtitle" data-i18n="subtitle">Spørgsmål blandet på tværs af alle 22 kapitler</p>

  <div class="card" id="start-screen">
    <div class="start-screen">
      <h2 style="color:var(--accent2);margin-bottom:16px" data-i18n="ready">Klar til at teste din viden?</h2>
      <p style="color:var(--muted);margin-bottom:24px" data-i18n="readyDesc">Quizzen indeholder spørgsmål fra alle 22 kapitler.<br>Vælg antal spørgsmål nedenfor.</p>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap">
        <button class="secondary" onclick="startQuiz(10)" data-i18n="btn10">10 spørgsmål (hurtig)</button>
        <button class="secondary" onclick="startQuiz(25)" data-i18n="btn25">25 spørgsmål</button>
        <button class="cta" onclick="startQuiz(54)" data-i18n="btnAll">Alle 54 spørgsmål</button>
      </div>
    </div>
  </div>

  <div class="card" id="quiz-screen" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-num" id="q-num"></div>
    <div class="question" id="q-text"></div>
    <div class="chapter" id="q-chapter"></div>
    <div class="options" id="q-options"></div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;justify-content:space-between;margin-top:20px;align-items:center">
      <span style="color:var(--muted)"><span data-i18n="scoreLabel">Score:</span> <b id="score">0</b></span>
      <button class="cta" id="next-btn" onclick="nextQuestion()" style="display:none">Næste →</button>
    </div>
  </div>

  <div class="card" id="end-screen" style="display:none">
    <div class="end-screen">
      <h2 style="color:var(--accent2);margin-bottom:16px" data-i18n="done">Quiz færdig! 🎉</h2>
      <div class="score-big" id="final-score">0 / 0</div>
      <div class="score-pct" id="final-pct">0 %</div>
      <p style="color:var(--muted);margin:24px 0" id="final-msg"></p>
      <button class="cta" onclick="location.reload()" data-i18n="retry">Prøv igen</button>
    </div>
  </div>
</div>

<script>
const UI = {
  da: {
    back: "← Tilbage til oversigt",
    title: "📝 Quiz — El-Teori",
    subtitle: "Spørgsmål blandet på tværs af alle 22 kapitler",
    ready: "Klar til at teste din viden?",
    readyDesc: "Quizzen indeholder spørgsmål fra alle 22 kapitler.<br>Vælg antal spørgsmål nedenfor.",
    btn10: "10 spørgsmål (hurtig)", btn25: "25 spørgsmål", btnAll: "Alle 54 spørgsmål",
    scoreLabel: "Score:", done: "Quiz færdig! 🎉", retry: "Prøv igen",
    qOf: (i, n) => `Spørgsmål ${i} af ${n}`,
    next: "Næste →", showResult: "Se resultat 🎯",
    correct: "✅ Korrekt!",
    wrong: (a) => `❌ Forkert. Det rigtige svar er: <b>${a}</b>`,
    msg90: "🌟 Fremragende! Du har styr på el-teorien.",
    msg75: "👍 Godt klaret! Lille gentagelse på de svære områder anbefales.",
    msg50: "📚 OK — gennemgå kapitlerne igen for at konsolidere stoffet.",
    msg0: "📖 Det er tid til at læse kapitlerne grundigt igennem. Du klarer det!"
  },
  en: {
    back: "← Back to overview",
    title: "📝 Quiz — Electrical Theory",
    subtitle: "Questions mixed across all 22 chapters",
    ready: "Ready to test your knowledge?",
    readyDesc: "The quiz contains questions from all 22 chapters.<br>Choose how many you want.",
    btn10: "10 questions (quick)", btn25: "25 questions", btnAll: "All 54 questions",
    scoreLabel: "Score:", done: "Quiz finished! 🎉", retry: "Try again",
    qOf: (i, n) => `Question ${i} of ${n}`,
    next: "Next →", showResult: "See result 🎯",
    correct: "✅ Correct!",
    wrong: (a) => `❌ Wrong. The correct answer is: <b>${a}</b>`,
    msg90: "🌟 Excellent! You have a solid grasp of the theory.",
    msg75: "👍 Well done! A short revision on the harder topics is recommended.",
    msg50: "📚 OK — go through the chapters again to consolidate.",
    msg0: "📖 Time to read the chapters carefully. You've got this!"
  },
  ar: {
    back: "→ العودة إلى القائمة",
    title: "📝 اختبار — النظرية الكهربائية",
    subtitle: "أسئلة مختلطة من جميع الفصول الـ 22",
    ready: "هل أنت جاهز لاختبار معلوماتك؟",
    readyDesc: "يحتوي الاختبار على أسئلة من جميع الفصول الـ 22.<br>اختر عدد الأسئلة أدناه.",
    btn10: "10 أسئلة (سريع)", btn25: "25 سؤالاً", btnAll: "جميع الأسئلة الـ 54",
    scoreLabel: "النتيجة:", done: "انتهى الاختبار! 🎉", retry: "حاول مرة أخرى",
    qOf: (i, n) => `السؤال ${i} من ${n}`,
    next: "التالي →", showResult: "إظهار النتيجة 🎯",
    correct: "✅ إجابة صحيحة!",
    wrong: (a) => `❌ إجابة خاطئة. الإجابة الصحيحة هي: <b>${a}</b>`,
    msg90: "🌟 ممتاز! إتقانك للنظرية واضح.",
    msg75: "👍 أحسنت! يُنصح بمراجعة قصيرة للنقاط الصعبة.",
    msg50: "📚 لا بأس — راجع الفصول مرة أخرى لترسيخ المفاهيم.",
    msg0: "📖 حان وقت قراءة الفصول بتأنٍّ. أنت قادر على ذلك!"
  }
};

// Helper to translate per-question text
const tr = (obj, lang) => (obj && typeof obj === 'object' && obj[lang] !== undefined) ? obj[lang] : obj;

// Chapter labels reused across questions
const CH = {
  bin: { da: "Kap. 5 — Binær regning", en: "Ch. 5 — Binary arithmetic", ar: "ف. 5 — الحساب الثنائي" },
  geo: { da: "Kap. 2 — Geometri", en: "Ch. 2 — Geometry", ar: "ف. 2 — الهندسة" },
  pyt: { da: "Kap. 2-3 — Pythagoras", en: "Ch. 2-3 — Pythagoras", ar: "ف. 2-3 — فيثاغورس" },
  tri: { da: "Kap. 3 — Trigonometri", en: "Ch. 3 — Trigonometry", ar: "ف. 3 — علم المثلثات" },
  unt: { da: "Kap. 6 — Måleenheder", en: "Ch. 6 — Units", ar: "ف. 6 — وحدات القياس" },
  che: { da: "Kap. 7 — Kemi", en: "Ch. 7 — Chemistry", ar: "ف. 7 — الكيمياء" },
  air: { da: "Kap. 8 — Luftteori", en: "Ch. 8 — Air theory", ar: "ف. 8 — نظرية الهواء" },
  ele: { da: "Kap. 9 — El-grundbegreber", en: "Ch. 9 — Electrical fundamentals", ar: "ف. 9 — المفاهيم الكهربائية" },
  dc:  { da: "Kap. 10 — Jævnstrøm", en: "Ch. 10 — DC theory", ar: "ف. 10 — التيار المستمر" },
  mag: { da: "Kap. 11 — Magnetisme", en: "Ch. 11 — Magnetism", ar: "ف. 11 — المغناطيسية" },
  trf: { da: "Kap. 11 — Transformer", en: "Ch. 11 — Transformer", ar: "ف. 11 — المحوّل" },
  ac:  { da: "Kap. 12 — AC", en: "Ch. 12 — AC", ar: "ف. 12 — التيار المتردد" },
  ph3: { da: "Kap. 13 — 3-fase", en: "Ch. 13 — 3-phase", ar: "ف. 13 — ثلاثي الطور" },
  res: { da: "Kap. 14 — Modstande", en: "Ch. 14 — Resistors", ar: "ف. 14 — المقاومات" },
  cap: { da: "Kap. 14 — Kondensatorer", en: "Ch. 14 — Capacitors", ar: "ف. 14 — المكثفات" },
  rcc: { da: "Kap. 14 — RC-led", en: "Ch. 14 — RC circuit", ar: "ف. 14 — دائرة RC" },
  trn: { da: "Kap. 15 — Transistor", en: "Ch. 15 — Transistor", ar: "ف. 15 — الترانزستور" },
  dio: { da: "Kap. 15 — Diode", en: "Ch. 15 — Diode", ar: "ف. 15 — الديود" },
  mos: { da: "Kap. 15 — MOSFET", en: "Ch. 15 — MOSFET", ar: "ف. 15 — MOSFET" },
  thy: { da: "Kap. 15 — Thyristor", en: "Ch. 15 — Thyristor", ar: "ف. 15 — الثايرستور" },
  rec: { da: "Kap. 17 — Ensretning", en: "Ch. 17 — Rectification", ar: "ف. 17 — التقويم" },
  pwr: { da: "Kap. 18 — Effektregulering", en: "Ch. 18 — Power regulation", ar: "ف. 18 — تنظيم القدرة" },
  mvb: { da: "Kap. 19 — Multivibrator", en: "Ch. 19 — Multivibrator", ar: "ف. 19 — المتذبذب" },
  log: { da: "Kap. 20 — Logik", en: "Ch. 20 — Logic", ar: "ف. 20 — المنطق" },
  meas: { da: "Kap. 22 — Måleteknik", en: "Ch. 22 — Measurement", ar: "ف. 22 — تقنية القياس" },
  pt100: { da: "Kap. 22 — PT100", en: "Ch. 22 — PT100", ar: "ف. 22 — PT100" },
  adc: { da: "Kap. 22 — ADC", en: "Ch. 22 — ADC", ar: "ف. 22 — ADC" }
};

const QUESTIONS = [
  // Numbers, geometry, trig
  { q: { da: "Hvilket decimaltal svarer det binære tal 1011 til?", en: "Which decimal number does the binary 1011 represent?", ar: "ما هو الرقم العشري المقابل للعدد الثنائي 1011؟" },
    opts: ["9", "11", "13", "15"], a: 1, ch: CH.bin },
  { q: { da: "Hvad er 255 skrevet i hexadecimal?", en: "What is 255 in hexadecimal?", ar: "ما هو 255 بالنظام السادس عشر؟" },
    opts: ["FF", "F0", "EE", "100"], a: 0, ch: CH.bin },
  { q: { da: "Hvad er omkredsen af en cirkel med diameter 10?", en: "What is the circumference of a circle with diameter 10?", ar: "ما هو محيط دائرة قطرها 10؟" },
    opts: [
      "31,4 / 31.4",
      "10π",
      "2π · 5",
      { da: "Alle tre er korrekte", en: "All three are correct", ar: "جميع الثلاثة صحيحة" }
    ], a: 3, ch: CH.geo },
  { q: { da: "I en retvinklet trekant er kateterne 3 og 4. Hvad er hypotenusen?", en: "In a right triangle the legs are 3 and 4. What is the hypotenuse?", ar: "في مثلث قائم الزاوية، الضلعان القائمان 3 و4. ما طول الوتر؟" },
    opts: ["5", "7", "12", "25"], a: 0, ch: CH.pyt },
  { q: { da: "Hvad er sin(45°)?", en: "What is sin(45°)?", ar: "ما قيمة sin(45°)؟" },
    opts: ["0,5 / 0.5", "0,707 / 0.707", "0,866 / 0.866", "1"], a: 1, ch: CH.tri },

  // Units
  { q: { da: "Hvor mange watt er 2,5 kW?", en: "How many watts is 2.5 kW?", ar: "كم واط في 2.5 kW؟" },
    opts: ["250 W", "2 500 W", "25 000 W", "0,25 W / 0.25 W"], a: 1, ch: CH.unt },
  { q: { da: "Hvor mange μF er 0,001 F?", en: "How many μF is 0.001 F?", ar: "كم μF في 0.001 F؟" },
    opts: ["1 μF", "100 μF", "1 000 μF", "1 000 000 μF"], a: 2, ch: CH.unt },
  { q: { da: "Hvad er 25 °C i kelvin?", en: "What is 25 °C in kelvin?", ar: "كم تساوي 25 °C بالكلفن؟" },
    opts: ["248,15 K", "298,15 K", "300 K", "25 K"], a: 1, ch: CH.unt },
  { q: { da: "Hvor mange J er 1 kWh?", en: "How many J is 1 kWh?", ar: "كم جول في 1 kWh؟" },
    opts: ["1 000", "3 600", "3 600 000", "60 000"], a: 2, ch: CH.unt },

  // Chemistry / air
  { q: { da: "Hvor mange valenselektroner har silicium (Si)?", en: "How many valence electrons does silicon (Si) have?", ar: "كم إلكترون تكافؤ يملك السيليكون (Si)؟" },
    opts: ["1", "2", "4", "8"], a: 2, ch: CH.che },
  { q: { da: "Hvilken gas udgør ca. 78 % af luften?", en: "Which gas makes up about 78% of air?", ar: "أي غاز يشكّل حوالي 78٪ من الهواء؟" },
    opts: [
      { da: "Oxygen", en: "Oxygen", ar: "الأكسجين" },
      { da: "Nitrogen", en: "Nitrogen", ar: "النيتروجين" },
      { da: "Argon", en: "Argon", ar: "الأرجون" },
      "CO₂"
    ], a: 1, ch: CH.air },
  { q: { da: "Hvad er det atmosfæriske tryk ved havoverfladen?", en: "What is atmospheric pressure at sea level?", ar: "ما الضغط الجوي عند مستوى سطح البحر؟" },
    opts: ["0,5 bar / 0.5 bar", "1 bar", "2 bar", "10 bar"], a: 1, ch: CH.air },

  // Electrical fundamentals
  { q: { da: "Hvilken enhed har strøm?", en: "What is the SI unit of current?", ar: "ما هي وحدة التيار؟" },
    opts: ["Volt", "Watt", "Ampere", "Ohm"], a: 2, ch: CH.ele },
  { q: { da: "Hvad er netfrekvensen i Danmark?", en: "What is the mains frequency in Denmark?", ar: "ما تردد الشبكة في الدنمارك؟" },
    opts: ["50 Hz", "60 Hz", "100 Hz", "230 Hz"], a: 0, ch: CH.ele },
  { q: { da: "Voltmeter tilsluttes…", en: "A voltmeter is connected…", ar: "يُوصَل الفولتميتر…" },
    opts: [
      { da: "I serie", en: "In series", ar: "على التوالي" },
      { da: "Parallelt", en: "In parallel", ar: "على التوازي" },
      { da: "Begge dele", en: "Both ways", ar: "بالطريقتين" },
      { da: "Med formodstand", en: "With multiplier resistor", ar: "مع مقاومة مُضاعِفة" }
    ], a: 1, ch: CH.ele },
  { q: { da: "Amperemeter tilsluttes…", en: "An ammeter is connected…", ar: "يُوصَل الأمبيرميتر…" },
    opts: [
      { da: "I serie", en: "In series", ar: "على التوالي" },
      { da: "Parallelt", en: "In parallel", ar: "على التوازي" },
      { da: "Begge dele", en: "Both ways", ar: "بالطريقتين" },
      { da: "Med shunt", en: "With shunt", ar: "مع مقاومة شَنت" }
    ], a: 0, ch: CH.ele },
  { q: { da: "Hvad er et HFI/HPFI-relæ designet til at udløse ved?", en: "What residual current does an RCD (HFI/HPFI) typically trip at?", ar: "ما تيار الخطأ الذي يفصل عنده قاطع التسرّب الأرضي عادةً؟" },
    opts: ["10 mA", "30 mA", "100 mA", "1 A"], a: 1, ch: CH.ele },

  // DC theory
  { q: { da: "Ohms lov er U = ?", en: "Ohm's law: U = ?", ar: "قانون أوم: U = ؟" },
    opts: ["I + R", "I × R", "I / R", "R / I"], a: 1, ch: CH.dc },
  { q: { da: "Hvor stor strøm går der gennem 100 Ω ved 12 V?", en: "How much current flows through 100 Ω at 12 V?", ar: "كم تيار يمرّ في 100 Ω عند 12 V؟" },
    opts: ["1,2 A / 1.2 A", "0,12 A / 0.12 A", "120 mA",
      { da: "Både B og C", en: "Both B and C", ar: "كل من B و C" }
    ], a: 3, ch: CH.dc },
  { q: { da: "I serie summeres…", en: "In a series circuit, what adds up?", ar: "في التوصيل على التوالي، ما الذي يُجمَع؟" },
    opts: [
      { da: "Strømmene", en: "The currents", ar: "التيارات" },
      { da: "Spændinger og modstande", en: "Voltages and resistances", ar: "الجهود والمقاومات" },
      { da: "Effekt", en: "Power", ar: "القدرة" },
      { da: "Frekvenser", en: "Frequencies", ar: "الترددات" }
    ], a: 1, ch: CH.dc },
  { q: { da: "I parallel er…", en: "In a parallel circuit…", ar: "في التوصيل على التوازي…" },
    opts: [
      { da: "Strømmen ens", en: "Current is the same", ar: "التيار ثابت" },
      { da: "Spændingen ens", en: "Voltage is the same", ar: "الجهد ثابت" },
      { da: "Modstanden størst", en: "Resistance is largest", ar: "المقاومة أكبر" },
      { da: "Effekten 0", en: "Power is 0", ar: "القدرة صفر" }
    ], a: 1, ch: CH.dc },
  { q: { da: "To 100 Ω modstande parallelt giver…", en: "Two 100 Ω resistors in parallel give…", ar: "مقاومتان 100 Ω على التوازي تعطيان…" },
    opts: ["50 Ω", "100 Ω", "200 Ω", "0 Ω"], a: 0, ch: CH.dc },
  { q: { da: "Effektformlen P = ?", en: "Power formula: P = ?", ar: "صيغة القدرة: P = ؟" },
    opts: ["U + I", "U × I", "U / I", "U − I"], a: 1, ch: CH.dc },

  // Magnetism
  { q: { da: "Hvor går magnetiske feltlinjer uden for en magnet?", en: "Outside a magnet, the magnetic field lines run…", ar: "خارج المغناطيس، تسير خطوط المجال…" },
    opts: [
      { da: "Tilfældigt", en: "Randomly", ar: "عشوائياً" },
      { da: "Slet ikke (ingen)", en: "Not at all", ar: "لا توجد" },

  { q: { da: "Farvekoden brun-sort-rød-guld svarer til en modstand på…", en: "The colour code brown-black-red-gold corresponds to…", ar: "رمز الألوان بُنّي-أسود-أحمر-ذهبي يقابل مقاومة قدرها…" },

    opts: [
      { da: "Modstande i serie", en: "Resistors in series", ar: "مقاومات على التوالي" },
      { da: "Modstande i parallel", en: "Resistors in parallel", ar: "مقاومات على التوازي" },
      { da: "Sum direkte", en: "Direct sum", ar: "جمع مباشر" },

  { q: { da: "Tidskonstanten τ for et RC-led er…", en: "The time constant τ of an RC circuit is…", ar: "ثابت الزمن τ لدائرة RC هو…" },

  { q: { da: "Hvor mange ben har en BJT-transistor?", en: "How many leads does a BJT transistor have?", ar: "كم طرفاً لترانزستور BJT؟" },

    ], a: 1, ch: CH.mos },

  // Rectification, power, multivibrator
  { q: { da: "Hvor mange dioder har en brokoblet ensretter?", en: "How many diodes does a bridge rectifier have?", ar: "كم ديوداً في مقوّم القنطرة؟" },
    opts: ["1", "2", "4", "6"], a: 2, ch: CH.rec },
  { q: { da: "Ripple-frekvensen efter en 1-faset brokobling ved 50 Hz er…", en: "The ripple frequency after a single-phase bridge at 50 Hz is…", ar: "تردد التموّج بعد قنطرة أحادية الطور عند 50 Hz هو…" },

    opts: [
      { da: "Fasestyring", en: "Phase control", ar: "بالتحكّم في زاوية الطور" },
      { da: "Nulpunktstyring", en: "Zero-crossing (burst) control", ar: "بالتبديل عند الصفر" },
      { da: "PWM", en: "PWM", ar: "PWM" },

    ], a: 1, ch: CH.pwr },
  { q: { da: "En astabil multivibrator har … stabile tilstande.", en: "An astable multivibrator has … stable states.", ar: "للمتذبذب اللامستقر … حالة مستقرة." },
    opts: ["0", "1", "2",
      { da: "Uendelig", en: "Infinite", ar: "ما لا نهاية" }

  { q: { da: "AND-port giver 1 hvis…", en: "AND gate outputs 1 when…", ar: "بوابة AND تعطي 1 عندما…" },

    opts: ["10", "100", "1 000", "10 000"], a: 1, ch: CH.pt100 },

    opts: ["12", "256", "1 024", "4 096"], a: 3, ch: CH.adc }
];

let currentLang = 'da';
let currentQ = 0;
let score = 0;
let activeQuestions = [];

function applyLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  const dict = UI[lang] || UI.da;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.querySelectorAll('.lang-switcher button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  try { localStorage.setItem('elteori-lang', lang); } catch (e) {}
  // Re-render current question if quiz is active
  if (document.getElementById('quiz-screen').style.display !== 'none' && activeQuestions.length) {
    showQuestion();
  }
}
document.querySelectorAll('.lang-switcher button').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang));
});
let savedLang = 'da';
try { savedLang = localStorage.getItem('elteori-lang') || 'da'; } catch (e) {}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(n) {
  activeQuestions = shuffle([...QUESTIONS]).slice(0, n);
  currentQ = 0; score = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('end-screen').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = activeQuestions[currentQ];
  const dict = UI[currentLang] || UI.da;
  document.getElementById('progress-fill').style.width = ((currentQ) / activeQuestions.length * 100) + '%';
  document.getElementById('q-num').textContent = dict.qOf(currentQ + 1, activeQuestions.length);
  document.getElementById('q-text').textContent = tr(q.q, currentLang);
  document.getElementById('q-chapter').textContent = '📖 ' + tr(q.ch, currentLang);
  document.getElementById('score').textContent = score;

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'option';
    b.textContent = tr(opt, currentLang);
    b.onclick = () => choose(i);
    opts.appendChild(b);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
}

function choose(i) {
  const q = activeQuestions[currentQ];
  const dict = UI[currentLang] || UI.da;
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => { o.classList.add('disabled'); o.onclick = null; });
  opts[q.a].classList.add('correct');
  if (i !== q.a) opts[i].classList.add('wrong');

  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (i === q.a) {
    score++;
    fb.classList.add('correct');
    fb.innerHTML = dict.correct;
  } else {
    fb.classList.add('wrong');
    fb.innerHTML = dict.wrong(tr(q.opts[q.a], currentLang));
  }
  document.getElementById('score').textContent = score;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent = (currentQ + 1 === activeQuestions.length) ? dict.showResult : dict.next;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= activeQuestions.length) {
    showEnd();
  } else {
    showQuestion();
  }
}

function showEnd() {
  const dict = UI[currentLang] || UI.da;
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'block';
  document.getElementById('final-score').textContent = `${score} / ${activeQuestions.length}`;
  const pct = Math.round(score / activeQuestions.length * 100);
  document.getElementById('final-pct').textContent = pct + ' %';
  let msg = '';
  if (pct >= 90) msg = dict.msg90;
  else if (pct >= 75) msg = dict.msg75;
  else if (pct >= 50) msg = dict.msg50;
  else msg = dict.msg0;
  document.getElementById('final-msg').textContent = msg;
}

applyLang(savedLang);
</script>
